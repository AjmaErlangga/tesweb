<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartArchive - Pro Document Scanner</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF untuk mengubah gambar menjadi file PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Phosphor Icons untuk UI yang profesional -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- OpenCV.js untuk Deteksi Tepi dan Auto Crop -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Reticle (Kotak target di kamera) */
        .reticle-corner { position: absolute; width: 30px; height: 30px; border-color: rgba(255, 255, 255, 0.7); border-style: solid; }
        .reticle-tl { top: 15%; left: 10%; border-width: 3px 0 0 3px; border-top-left-radius: 8px; }
        .reticle-tr { top: 15%; right: 10%; border-width: 3px 3px 0 0; border-top-right-radius: 8px; }
        .reticle-bl { bottom: 15%; left: 10%; border-width: 0 0 3px 3px; border-bottom-left-radius: 8px; }
        .reticle-br { bottom: 15%; right: 10%; border-width: 0 3px 3px 0; border-bottom-right-radius: 8px; }
        
        /* Lightbox (Penampil Gambar Besar) */
        #lightbox { transition: opacity 0.3s ease; }
        #lightbox.show { opacity: 1; pointer-events: auto; }
        #lightbox.hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="text-slate-800 flex flex-col items-center min-h-screen p-4 sm:p-8 relative">

    <!-- Pesan Pemuatan OpenCV -->
    <div id="opencvLoadingMsg" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center fade-in">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-xs text-center">
            <div class="loader mb-4 border-slate-200 border-top-blue-600 w-10 h-10 border-4"></div>
            <h2 class="text-slate-800 font-bold text-lg mb-1">Memuat Modul AI</h2>
            <p class="text-slate-500 text-sm">Menyiapkan sistem deteksi batas kertas otomatis...</p>
        </div>
    </div>

    <!-- Pesan Alert Kustom (Pengganti window.alert) -->
    <div id="customAlert" class="fixed top-4 inset-x-4 sm:inset-x-auto sm:right-4 z-50 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl shadow-lg hidden fade-in flex items-center gap-3">
        <i class="ph-fill ph-warning-circle text-2xl"></i>
        <span id="alertMessage" class="text-sm font-medium">Pesan error di sini</span>
        <button onclick="document.getElementById('customAlert').classList.add('hidden')" class="ml-auto p-1"><i class="ph ph-x"></i></button>
    </div>

    <header class="w-full max-w-lg mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                <i class="ph-fill ph-scan text-blue-600"></i> SmartArchive
            </h1>
            <p class="text-sm text-slate-500 font-medium mt-1">Auto-Crop & Cloud OCR</p>
        </div>
    </header>

    <main class="w-full max-w-lg glass-panel rounded-2xl p-5 sm:p-7 relative fade-in">
        
        <!-- Pilihan Aksi Utama -->
        <div class="grid grid-cols-2 gap-3 mb-2 opacity-50 pointer-events-none transition-opacity duration-300" id="actionButtons">
            <button onclick="startCamera()" class="group flex flex-col items-center justify-center p-6 rounded-xl bg-white border border-slate-200 hover:border-blue-400 hover:shadow-md hover:bg-blue-50 transition-all text-slate-700">
                <div class="h-14 w-14 bg-blue-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                    <i class="ph ph-camera text-3xl text-blue-600"></i>
                </div>
                <span class="font-semibold text-sm sm:text-base">Kamera</span>
            </button>
            
            <label for="imageUpload" class="group flex flex-col items-center justify-center p-6 rounded-xl bg-white border border-slate-200 hover:border-slate-300 hover:shadow-md hover:bg-slate-50 transition-all text-slate-700 cursor-pointer">
                <div class="h-14 w-14 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                    <i class="ph ph-image text-3xl text-slate-600"></i>
                </div>
                <span class="font-semibold text-sm sm:text-base">Galeri</span>
                <input id="imageUpload" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
            </label>
        </div>

        <!-- Area Kamera -->
        <div id="cameraContainer" class="hidden flex-col gap-3 mb-4 fade-in">
            <div class="relative w-full bg-black rounded-xl overflow-hidden aspect-[3/4] flex items-center justify-center shadow-inner">
                <!-- Video stream -->
                <video id="cameraStream" class="w-full h-full object-cover" autoplay playsinline muted></video>
                
                <!-- Kotak Bantuan Dokumen di Kamera -->
                <div class="absolute inset-0 pointer-events-none">
                    <div class="reticle-corner reticle-tl"></div>
                    <div class="reticle-corner reticle-tr"></div>
                    <div class="reticle-corner reticle-bl"></div>
                    <div class="reticle-corner reticle-br"></div>
                    <div class="absolute top-4 w-full text-center">
                        <span class="bg-black/50 text-white/90 text-xs px-3 py-1 rounded-full backdrop-blur-sm shadow">Bidik dokumen dengan pencahayaan baik</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="stopCamera()" class="flex-1 py-3 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition">Batal</button>
                <button onclick="capturePhoto()" class="flex-[2] py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition flex justify-center items-center gap-2">
                    <i class="ph-fill ph-aperture text-xl"></i> Jepret
                </button>
            </div>
        </div>

        <!-- Status Loading Pemrosesan -->
        <div id="loadingStatus" class="hidden flex-col items-center justify-center py-8 mb-2">
            <div class="loader mb-4"></div>
            <p id="statusText" class="text-sm font-semibold text-blue-700 text-center">Memproses Gambar...</p>
        </div>

        <!-- Hasil Ekstraksi -->
        <div id="resultContainer" class="hidden fade-in flex-col gap-5 mt-4">
            
            <!-- Metadata Form -->
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-3">
                    <i class="ph-fill ph-file-text text-blue-500 text-xl"></i>
                    <h3 class="font-bold text-slate-800 text-sm">Informasi Dokumen (Halaman 1)</h3>
                </div>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">Order Number</label>
                        <div class="relative">
                            <i class="ph ph-hash absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="orderNumberInput" class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm text-slate-800 font-medium" placeholder="Menunggu scan...">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">Shipment Date</label>
                        <div class="relative">
                            <i class="ph ph-calendar-blank absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="shipmentDateInput" class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm text-slate-800 font-medium" placeholder="Menunggu scan...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Galeri Halaman Scan -->
            <div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <h3 class="text-sm font-bold text-slate-800">Halaman Discan (<span id="pageCount">0</span>)</h3>
                    <p class="text-[10px] text-slate-500">Klik untuk memperbesar</p>
                </div>
                
                <!-- Grid Galeri -->
                <div id="pagesGallery" class="grid grid-cols-3 sm:grid-cols-4 gap-2">
                    <!-- Thumbnail di-generate via JS -->
                </div>
            </div>

            <!-- Tombol Aksi Bawah -->
            <div class="flex gap-3 pt-2">
                <button onclick="startCamera()" class="flex-1 py-3 px-2 bg-blue-50 text-blue-700 font-semibold rounded-xl border border-blue-200 hover:bg-blue-100 transition flex justify-center items-center gap-1.5 text-sm">
                    <i class="ph-bold ph-plus"></i> Tambah Hal
                </button>
                <button id="saveBtn" onclick="saveAsPDF()" class="flex-[2] bg-slate-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-slate-300 transition flex justify-center items-center gap-2 text-sm">
                    <i class="ph-bold ph-file-pdf text-lg text-red-400"></i> Simpan ke PDF
                </button>
            </div>
        </div>
    </main>

    <!-- Lightbox (Penampil Gambar Besar) -->
    <div id="lightbox" class="hide fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
        <button onclick="closeLightbox()" class="absolute top-4 right-4 sm:top-8 sm:right-8 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full text-white flex items-center justify-center transition backdrop-blur z-50">
            <i class="ph ph-x text-2xl"></i>
        </button>
        <!-- Container Gambar dengan scroll jika panjang -->
        <div class="w-full h-full overflow-y-auto flex items-center justify-center p-2 mt-12 sm:mt-0">
            <img id="lightboxImage" src="" class="max-w-full h-auto object-contain rounded-lg shadow-2xl" alt="Preview Dokumen Detail">
        </div>
        <p class="text-white/60 text-sm mt-4 pb-4">Ketuk di luar gambar untuk menutup</p>
    </div>

    <!-- Canvas tersembunyi untuk perantara -->
    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        // --- KONFIGURASI URL APPS SCRIPT (GOOGLE VISION) ---
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwr6T6Q0dWXinD_hNYlUuORtnKrTCDBUkUwSfpkK70uKFIA2-Q9DzrLgprN45aRpkWB/exec";
        
        // --- STATE APLIKASI ---
        let scannedPages = []; // Menyimpan base64 hasil auto-crop
        let videoStream = null;
        let isCvReady = false;

        // Fungsi menampilkan pesan error kustom (pengganti alert)
        function showAlert(msg) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('customAlert').classList.remove('hidden');
            setTimeout(() => { document.getElementById('customAlert').classList.add('hidden'); }, 5000);
        }

        // --- MANAJEMEN OPENCV LOAD ---
        let cvCheckInterval = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                clearInterval(cvCheckInterval);
                isCvReady = true;
                // Hilangkan layar loading, aktifkan tombol
                document.getElementById('opencvLoadingMsg').classList.add('hidden');
                document.getElementById('actionButtons').classList.remove('opacity-50', 'pointer-events-none');
            }
        }, 500);

        // --- MANAJEMEN LIGHTBOX ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImage');

        function openLightbox(base64Src) {
            lightboxImg.src = base64Src;
            lightbox.classList.remove('hide');
            lightbox.classList.add('show');
        }

        function closeLightbox() {
            lightbox.classList.remove('show');
            lightbox.classList.add('hide');
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }

        lightbox.addEventListener('click', function(e) {
            if(e.target === lightbox || e.target.tagName !== 'IMG') closeLightbox();
        });

        // --- MANAJEMEN KAMERA ---
        async function startCamera() {
            const cameraContainer = document.getElementById('cameraContainer');
            const video = document.getElementById('cameraStream');
            const actionButtons = document.getElementById('actionButtons');
            const resultContainer = document.getElementById('resultContainer');
            
            try {
                // Minta resolusi sangat tinggi, browser akan menyesuaikan ke batas max kamera HP otomatis
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } } 
                });
                video.srcObject = videoStream;
                
                cameraContainer.classList.remove('hidden');
                cameraContainer.classList.add('flex');
                actionButtons.classList.add('hidden');
                resultContainer.classList.add('hidden');
            } catch (err) {
                console.error("Gagal akses kamera:", err);
                showAlert("Kamera tidak dapat diakses. Pastikan izin kamera diaktifkan di browser Anda.");
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            document.getElementById('cameraContainer').classList.remove('flex');
            document.getElementById('cameraContainer').classList.add('hidden');
            
            // Tampilkan kembali hasil jika ada, jika kosong ke menu awal
            if(scannedPages.length > 0) {
                document.getElementById('resultContainer').classList.remove('hidden');
            } else {
                document.getElementById('actionButtons').classList.remove('hidden');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('cameraStream');
            if(!video.videoWidth) return; 
            
            const canvas = document.getElementById('hiddenCanvas');
            let vw = video.videoWidth;
            let vh = video.videoHeight;
            
            // Batasi ukuran gambar aman (Max Quad HD) untuk mencegah memori HP penuh saat OpenCV bekerja
            const MAX_RES = 2560; 
            if (vw > MAX_RES || vh > MAX_RES) {
                const ratio = Math.min(MAX_RES / vw, MAX_RES / vh);
                vw = Math.round(vw * ratio);
                vh = Math.round(vh * ratio);
            }
            
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Img = canvas.toDataURL('image/jpeg', 1.0);
            stopCamera();
            
            processPageFlow(base64Img);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('actionButtons').classList.add('hidden');
            const reader = new FileReader();
            reader.onload = function(e) {
                processPageFlow(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        // --- ALGORITMA OPENCV (AUTO CROP / PERATAAN KERTAS) ---
        function autoCropDocument(imageSrc) {
            return new Promise((resolve) => {
                if (!isCvReady) {
                    resolve({ success: false, base64: imageSrc }); // Fallback aman
                    return;
                }

                let imgElement = new Image();
                imgElement.onload = function() {
                    let src = null, gray = null, blurred = null, edges = null, contours = null, hierarchy = null, M_dilate = null, warped = null;
                    try {
                        src = cv.imread(imgElement);
                        gray = new cv.Mat();
                        blurred = new cv.Mat();
                        edges = new cv.Mat();
                        
                        // 1. Pre-processing: Grayscale & Blur
                        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                        let ksize = new cv.Size(5, 5);
                        cv.GaussianBlur(gray, blurred, ksize, 0, 0, cv.BORDER_DEFAULT);
                        
                        // 2. Edge Detection (Canny)
                        cv.Canny(blurred, edges, 75, 200, 3, false);
                        
                        // 3. Dilation (Menebalkan garis tepi agar sudut kertas tidak terputus)
                        M_dilate = cv.Mat.ones(3, 3, cv.CV_8U);
                        cv.dilate(edges, edges, M_dilate, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
                        
                        // 4. Cari Bentuk (Contours)
                        contours = new cv.MatVector();
                        hierarchy = new cv.Mat();
                        cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
                        
                        // Filter kontur yang luasnya cukup besar (mengabaikan teks kecil/noise)
                        let sortableContours = [];
                        let minArea = (src.cols * src.rows) * 0.1; // Minimal 10% layar
                        
                        for (let i = 0; i < contours.size(); ++i) {
                            let cnt = contours.get(i);
                            let area = cv.contourArea(cnt, false);
                            if (area > minArea) {
                                sortableContours.push({ cnt: cnt, area: area });
                            }
                        }
                        
                        // Urutkan dari yang terbesar
                        sortableContours.sort((a, b) => b.area - a.area);
                        
                        let bestContour = null;
                        
                        // Cari yang poligonnya bersudut 4 (Segi empat)
                        for (let i = 0; i < Math.min(sortableContours.length, 5); ++i) {
                            let cnt = sortableContours[i].cnt;
                            let peri = cv.arcLength(cnt, true);
                            let approx = new cv.Mat();
                            cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                            
                            if (approx.rows === 4) {
                                bestContour = approx.clone();
                                approx.delete();
                                break;
                            }
                            approx.delete();
                        }
                        
                        if (bestContour) {
                            // Ekstrak koordinat 4 sudut
                            let points = [];
                            for(let i=0; i<4; i++) {
                                points.push({x: bestContour.data32S[i*2], y: bestContour.data32S[i*2+1]});
                            }
                            bestContour.delete();
                            
                            // Urutkan koordinat menjadi TL, TR, BL, BR
                            points.sort((a,b) => a.y - b.y);
                            let top = points.slice(0,2).sort((a,b) => a.x - b.x);
                            let bottom = points.slice(2,4).sort((a,b) => a.x - b.x);
                            
                            let tl = top[0], tr = top[1], bl = bottom[0], br = bottom[1];
                            
                            // Kalkulasi Lebar & Tinggi perspektif baru
                            let widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
                            let widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
                            let maxWidth = Math.max(widthA, widthB);
                            
                            let heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
                            let heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
                            let maxHeight = Math.max(heightA, heightB);
                            
                            // Transformasi Perspektif (Warping)
                            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth-1, 0, maxWidth-1, maxHeight-1, 0, maxHeight-1]);
                            
                            let M = cv.getPerspectiveTransform(srcTri, dstTri);
                            warped = new cv.Mat();
                            let dsize = new cv.Size(maxWidth, maxHeight);
                            
                            // Menarik dan meluruskan gambar warna asli
                            cv.warpPerspective(src, warped, M, dsize, cv.INTER_CUBIC, cv.BORDER_CONSTANT, new cv.Scalar());
                            
                            let outCanvas = document.createElement('canvas');
                            cv.imshow(outCanvas, warped);
                            let croppedBase64 = outCanvas.toDataURL('image/jpeg', 0.95);
                            
                            // Cleanup Memori
                            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                            src.delete(); gray.delete(); blurred.delete(); edges.delete(); contours.delete(); hierarchy.delete();
                            if (M_dilate) M_dilate.delete();
                            
                            resolve({ success: true, base64: croppedBase64 });
                        } else {
                            // Gagal nemu segi empat, kembalikan gambar asli
                            src.delete(); gray.delete(); blurred.delete(); edges.delete(); contours.delete(); hierarchy.delete();
                            if (M_dilate) M_dilate.delete();
                            resolve({ success: false, base64: imageSrc });
                        }
                    } catch (e) {
                        console.error("OpenCV Error:", e);
                        // Cleanup jika error
                        if(src) src.delete(); if(gray) gray.delete(); if(blurred) blurred.delete(); 
                        if(edges) edges.delete(); if(contours) contours.delete(); if(hierarchy) hierarchy.delete();
                        if(M_dilate) M_dilate.delete(); if(warped) warped.delete();
                        resolve({ success: false, base64: imageSrc });
                    }
                };
                imgElement.src = imageSrc;
            });
        }

        // --- ALUR PEMROSESAN UTAMA ---
        async function processPageFlow(rawBase64) {
            const loadingStatus = document.getElementById('loadingStatus');
            const statusText = document.getElementById('statusText');
            
            loadingStatus.classList.remove('hidden');
            loadingStatus.classList.add('flex');
            
            const isFirstPage = scannedPages.length === 0;

            // Tahap 1: Smart Auto Crop (OpenCV)
            statusText.innerText = "Menganalisa dan meratakan dokumen...";
            await new Promise(r => setTimeout(r, 50)); // Render delay
            
            const cropResult = await autoCropDocument(rawBase64);
            const finalImageBase64 = cropResult.base64;
            
            scannedPages.push(finalImageBase64); // Simpan ke array multi-page
            
            // Tahap 2: Google Vision OCR (Hanya untuk Halaman Pertama)
            if (isFirstPage) {
                statusText.innerText = "Cloud AI sedang mengekstrak teks...";
                await performCloudOCR(finalImageBase64);
            }

            // Update Galeri & Selesai
            updateGalleryUI();
            
            loadingStatus.classList.remove('flex');
            loadingStatus.classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('flex');
        }

        function updateGalleryUI() {
            document.getElementById('pageCount').innerText = scannedPages.length;
            const gallery = document.getElementById('pagesGallery');
            gallery.innerHTML = '';

            scannedPages.forEach((base64Src, index) => {
                const thumbDiv = document.createElement('div');
                thumbDiv.className = "relative aspect-[3/4] bg-slate-200 rounded-lg overflow-hidden border border-slate-300 shadow-sm cursor-pointer hover:border-blue-500 hover:ring-2 hover:ring-blue-200 transition group";
                thumbDiv.onclick = () => openLightbox(base64Src);

                thumbDiv.innerHTML = `
                    <img src="${base64Src}" class="w-full h-full object-cover" />
                    <div class="absolute bottom-0 inset-x-0 bg-black/60 backdrop-blur-sm text-white text-[10px] text-center py-1 font-medium">Hal. ${index + 1}</div>
                    <div class="absolute inset-0 bg-blue-500/0 group-hover:bg-blue-500/10 transition flex items-center justify-center">
                        <i class="ph-fill ph-magnifying-glass-plus text-white opacity-0 group-hover:opacity-100 text-xl drop-shadow-md transition"></i>
                    </div>
                `;
                gallery.appendChild(thumbDiv);
            });
        }

        // --- GOOGLE VISION API (VIA APPS SCRIPT) ---
        async function performCloudOCR(base64Src) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Src }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const data = await response.json();
                if (data.success) {
                    extractSmartData(data.text);
                } else {
                    console.error("OCR Error:", data.error);
                    showAlert("Gagal memproses teks. Silakan isi manual.");
                }
            } catch (error) {
                console.error("Network Error:", error);
                showAlert("Gagal terhubung ke Cloud. Pastikan internet Anda aktif.");
            }
        }

        function extractSmartData(text) {
            // Regex Pintar Baru: Langsung mencari pola unik 181- dan mengabaikan teks sekitarnya
            let orderNo = "";
            const strictOrderRegex = /(?:181\-)[0-9]{8,15}/g;
            const orderMatches = text.match(strictOrderRegex);
            
            if(orderMatches && orderMatches.length > 0) {
                orderNo = orderMatches[0];
            } else {
                // Cadangan
                const fallbackRegex = /(?:Order|0rder)\s*#?\s*[:\-]?\s*([A-Za-z0-9\-]+)/i;
                const fbMatch = text.match(fallbackRegex);
                if(fbMatch && fbMatch[1]) orderNo = fbMatch[1].trim();
            }

            // Regex Tanggal
            let shipDate = "";
            const dateRegex = /(?:Shipment|Shiprnent|Shtptnent)\s*(?:Date|Dato)\s*[:\-]?\s*([0-9A-Za-z\/\-\.]+)/i;
            const dateMatch = text.match(dateRegex);
            
            if(dateMatch && dateMatch[1]) {
                shipDate = dateMatch[1].trim();
            } else {
                // Cari angka mirip format DD/MM/YYYY
                const fallbackDate = /([0-9]{1,2}[\/\-\.][0-9]{1,2}[\/\-\.][0-9]{2,4})/;
                const fbDateMatch = text.match(fallbackDate);
                if(fbDateMatch && fbDateMatch[1]) shipDate = fbDateMatch[1];
            }

            document.getElementById('orderNumberInput').value = orderNo || "Tidak ditemukan";
            document.getElementById('shipmentDateInput').value = shipDate || "Tidak ditemukan";
        }

        // --- EKSPOR KE PDF ---
        function saveAsPDF() {
            if (scannedPages.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Dimensi A4 dalam milimeter
            const pdfWidth = 210;
            const pdfHeight = 297;

            for(let i = 0; i < scannedPages.length; i++) {
                if (i > 0) doc.addPage();
                
                // Menghitung rasio gambar agar pas proporsional di tengah halaman PDF
                let imgProps = doc.getImageProperties(scannedPages[i]);
                let imgRatio = imgProps.width / imgProps.height;
                let pdfRatio = pdfWidth / pdfHeight;
                
                let renderWidth = pdfWidth;
                let renderHeight = pdfHeight;
                let x = 0;
                let y = 0;

                // Fit to Page Logic (Mencegah gambar gepeng jika rasio crop melenceng dari A4)
                if (imgRatio > pdfRatio) {
                    // Gambar terlalu lebar
                    renderHeight = pdfWidth / imgRatio;
                    y = (pdfHeight - renderHeight) / 2;
                } else {
                    // Gambar terlalu tinggi
                    renderWidth = pdfHeight * imgRatio;
                    x = (pdfWidth - renderWidth) / 2;
                }
                
                doc.addImage(scannedPages[i], 'JPEG', x, y, renderWidth, renderHeight);
            }

            // Pembuatan Nama File
            let orderNo = document.getElementById('orderNumberInput').value.trim();
            let shipDate = document.getElementById('shipmentDateInput').value.trim();

            if (!orderNo || orderNo === "Tidak ditemukan") orderNo = "Arsip";
            if (!shipDate || shipDate === "Tidak ditemukan") shipDate = "Dokumen";

            shipDate = shipDate.replace(/[\/\\]/g, '-');
            orderNo = orderNo.replace(/[^a-zA-Z0-9\-]/g, '');
            
            const newFileName = `${orderNo}_${shipDate}.pdf`;
            doc.save(newFileName);
        }
    </script>
