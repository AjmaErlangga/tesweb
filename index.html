<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Arsip Dokumen OCR</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 p-4 sm:p-8">

    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-lg p-6 sm:p-8 relative">

        <h1 class="text-2xl font-bold text-center text-blue-600 mb-2">Scanner Arsip (Google Vision)</h1>
        <p class="text-center text-gray-500 mb-8 text-sm">Upload foto dokumen untuk mengekstrak Order # dan Shipment Date menggunakan teknologi Google Cloud AI.</p>

        <!-- Pilihan Aksi -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 transition-opacity duration-300" id="actionButtons">
            <button onclick="startCamera()" class="flex flex-col items-center justify-center py-8 border-2 border-blue-400 rounded-xl bg-blue-50 hover:bg-blue-100 transition text-blue-700 font-semibold shadow-sm">
                <svg aria-hidden="true" class="w-12 h-12 mb-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Buka Kamera HP
            </button>
            
            <label for="imageUpload" class="flex flex-col items-center justify-center py-8 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition shadow-sm text-gray-700 font-semibold">
                <svg aria-hidden="true" class="w-12 h-12 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Upload File / Galeri
                <input id="imageUpload" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
            </label>
        </div>

        <!-- Area Kamera -->
        <div id="cameraContainer" class="hidden mb-6 rounded-xl overflow-hidden bg-black border-2 border-gray-800 shadow-lg flex-col">
            <div class="relative w-full bg-black flex items-center justify-center min-h-[40vh]">
                <video id="cameraStream" class="w-full max-h-[60vh] object-contain" autoplay playsinline muted></video>
                <!-- Garis bantu dihapus karena tidak ada auto-crop lagi, cukup fokuskan tulisan ke tengah -->
            </div>
            <div class="p-4 bg-gray-900 flex justify-center gap-3 sm:gap-4 w-full">
                <button onclick="stopCamera()" class="bg-gray-700 text-white font-semibold py-2 px-4 sm:px-6 rounded-full shadow-lg hover:bg-gray-600 border border-gray-500 text-sm sm:text-base">
                    Batal
                </button>
                <button onclick="capturePhoto()" class="bg-blue-600 text-white font-bold py-2 px-6 sm:px-8 rounded-full shadow-lg hover:bg-blue-700 border-2 border-white flex items-center gap-2 text-sm sm:text-base">
                    📸 Ambil Foto
                </button>
            </div>
        </div>
        
        <canvas id="canvas" class="hidden"></canvas>

        <!-- Preview Gambar -->
        <div id="previewContainer" class="hidden mb-6">
            <p class="font-semibold text-sm mb-2 text-gray-700">Preview Dokumen Asli:</p>
            <img id="imagePreview" class="max-w-full h-auto rounded border-2 border-blue-200 shadow-sm" alt="Preview Dokumen" />
        </div>

        <!-- Status Loading Pemrosesan -->
        <div id="loadingStatus" class="hidden flex flex-col items-center justify-center mb-6 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
            <div class="loader mb-3"></div>
            <p id="statusText" class="text-sm font-medium text-yellow-700 text-center">Menghubungkan ke Google AI Cloud... <br><span class='text-xs font-normal'>Memindai teks pada dokumen.</span></p>
        </div>

        <!-- Hasil Ekstraksi -->
        <div id="resultContainer" class="hidden bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6">
            <h3 class="font-bold text-gray-700 mb-4 border-b pb-2">Hasil Ekstraksi Data</h3>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Order #</label>
                <input type="text" id="orderNumberInput" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: 181-0000771522">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Shipment Date</label>
                <input type="text" id="shipmentDateInput" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: 10/04/2026">
            </div>

            <details class="text-xs text-gray-500 mt-4">
                <summary class="cursor-pointer font-medium hover:text-gray-700">Lihat seluruh teks yang terbaca (Debugging)</summary>
                <div id="rawText" class="mt-2 p-2 bg-white border rounded h-32 overflow-y-auto whitespace-pre-wrap font-mono text-xs"></div>
            </details>
        </div>

        <!-- Tombol Simpan -->
        <button id="saveBtn" onclick="saveImage()" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Simpan Gambar
        </button>

    </div>

    <script>
        let currentImageBase64 = null;
        let originalFileExtension = 'png';
        let videoStream = null;

        // URL Google Apps Script yang baru saja Anda buat
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwr6T6Q0dWXinD_hNYlUuORtnKrTCDBUkUwSfpkK70uKFIA2-Q9DzrLgprN45aRpkWB/exec";

        // --- Fungsi UI & Kamera Dasar ---
        
        async function startCamera() {
            const cameraContainer = document.getElementById('cameraContainer');
            const video = document.getElementById('cameraStream');
            const actionButtons = document.getElementById('actionButtons');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = videoStream;
                cameraContainer.classList.remove('hidden');
                cameraContainer.classList.add('flex');
                actionButtons.classList.add('hidden');
                resetUI();
            } catch (err) {
                console.error("Gagal akses kamera:", err);
                alert("Tidak dapat mengakses kamera. Pastikan browser mengizinkan akses.");
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            document.getElementById('cameraContainer').classList.remove('flex');
            document.getElementById('cameraContainer').classList.add('hidden');
            document.getElementById('actionButtons').classList.remove('hidden');
        }

        function capturePhoto() {
            const video = document.getElementById('cameraStream');
            const canvas = document.getElementById('canvas');
            
            let vw = video.videoWidth;
            let vh = video.videoHeight;
            
            // Batasi maksimal resolusi. Cloud Vision membatasi ukuran file agar tidak terlalu besar
            const MAX_RES = 1600; 
            if (vw > MAX_RES || vh > MAX_RES) {
                const ratio = Math.min(MAX_RES / vw, MAX_RES / vh);
                vw = Math.round(vw * ratio);
                vh = Math.round(vh * ratio);
            }
            
            canvas.width = vw || 1280;
            canvas.height = vh || 720;
            
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Konversi ke base64
            const base64Img = canvas.toDataURL('image/jpeg', 0.9);
            originalFileExtension = 'jpg';
            
            stopCamera();
            processImageFlow(base64Img);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            resetUI();
            const fileNameParts = file.name.split('.');
            if(fileNameParts.length > 1) originalFileExtension = fileNameParts.pop().toLowerCase();

            const reader = new FileReader();
            reader.onload = function(e) {
                processImageFlow(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        function resetUI() {
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('loadingStatus').classList.add('hidden'); 
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('orderNumberInput').value = '';
            document.getElementById('shipmentDateInput').value = '';
            document.getElementById('rawText').innerText = '';
        }

        // --- Alur Pemrosesan (Langsung ke Cloud Vision via Apps Script) ---

        async function processImageFlow(base64Image) {
            const loadingStatus = document.getElementById('loadingStatus');
            loadingStatus.classList.remove('hidden');
            
            // Tampilkan foto asli langsung
            const imgPreview = document.getElementById('imagePreview');
            imgPreview.src = base64Image;
            document.getElementById('previewContainer').classList.remove('hidden');
            
            currentImageBase64 = base64Image;

            await performCloudOCR(currentImageBase64);
            
            loadingStatus.classList.add('hidden');
        }

        // --- Fungsi OCR Google Cloud Vision via Apps Script ---

        async function performCloudOCR(imageSrc) {
            try {
                // Kirim POST request ke Google Apps Script (Backend)
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: imageSrc }),
                    // Penting: pastikan Content-Type diset agar backend bisa membaca JSON-nya
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', 
                    }
                });

                const data = await response.json();

                if (data.success) {
                    const text = data.text;
                    if (!text) {
                        alert("Tidak ada teks yang terdeteksi di gambar ini.");
                        document.getElementById('rawText').innerText = "Tidak ada teks.";
                        return;
                    }

                    document.getElementById('rawText').innerText = text; 
                    extractData(text);
                } else {
                    console.error("Error dari Apps Script:", data.error);
                    alert("Gagal membaca teks (Server Error): " + data.error);
                }

            } catch (error) {
                console.error("Error fetch API:", error);
                alert("Gagal terhubung ke server pindaian. Pastikan internet Anda lancar.");
            } finally {
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('saveBtn').disabled = false;
            }
        }

        // Fungsi Ekstraksi (Pencarian Pola Teks)
        function extractData(text) {
            // Regex mencari Order #
            const orderRegex = /Order\s*#?\s*[:\-]?\s*([A-Za-z0-9\-]+)/i;
            const orderMatch = text.match(orderRegex);
            
            // Regex mencari Shipment Date
            const dateRegex = /Shipment\s*Date\s*[:\-]?\s*([0-9A-Za-z\/]+)/i;
            const dateMatch = text.match(dateRegex);

            document.getElementById('orderNumberInput').value = (orderMatch && orderMatch[1]) ? orderMatch[1].trim() : "Tidak ditemukan";
            document.getElementById('shipmentDateInput').value = (dateMatch && dateMatch[1]) ? dateMatch[1].trim() : "Tidak ditemukan";
        }

        function saveImage() {
            if (!currentImageBase64) return;

            let orderNo = document.getElementById('orderNumberInput').value.trim();
            let shipDate = document.getElementById('shipmentDateInput').value.trim();

            if (!orderNo || orderNo === "Tidak ditemukan") orderNo = "UnknownOrder";
            if (!shipDate || shipDate === "Tidak ditemukan") shipDate = "UnknownDate";

            shipDate = shipDate.replace(/\//g, '-');
            orderNo = orderNo.replace(/[^a-zA-Z0-9\-]/g, '');
            
            const newFileName = `Order_${orderNo}_Date_${shipDate}.${originalFileExtension}`;

            const link = document.createElement('a');
            link.href = currentImageBase64;
            link.download = newFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
