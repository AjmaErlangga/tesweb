<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartArchive - Pro Document Scanner</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPDF untuk mengubah gambar menjadi file PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Phosphor Icons untuk UI yang profesional -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Reticle (Kotak target di kamera) */
        .reticle-corner { position: absolute; width: 30px; height: 30px; border-color: rgba(255, 255, 255, 0.7); border-style: solid; }
        .reticle-tl { top: 15%; left: 10%; border-width: 3px 0 0 3px; border-top-left-radius: 8px; }
        .reticle-tr { top: 15%; right: 10%; border-width: 3px 3px 0 0; border-top-right-radius: 8px; }
        .reticle-bl { bottom: 15%; left: 10%; border-width: 0 0 3px 3px; border-bottom-left-radius: 8px; }
        .reticle-br { bottom: 15%; right: 10%; border-width: 0 3px 3px 0; border-bottom-right-radius: 8px; }
        
        /* Lightbox (Penampil Gambar Besar) */
        #lightbox { transition: opacity 0.3s ease; }
        #lightbox.show { opacity: 1; pointer-events: auto; }
        #lightbox.hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="text-slate-800 flex flex-col items-center min-h-screen p-4 sm:p-8">

    <header class="w-full max-w-lg mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                <i class="ph-fill ph-scan text-blue-600"></i> SmartArchive
            </h1>
            <p class="text-sm text-slate-500 font-medium mt-1">Multi-Page PDF & Cloud OCR</p>
        </div>
    </header>

    <main class="w-full max-w-lg glass-panel rounded-2xl p-5 sm:p-7 relative fade-in">
        
        <!-- Pilihan Aksi Utama -->
        <div class="grid grid-cols-2 gap-3 mb-2" id="actionButtons">
            <button onclick="startCamera()" class="group flex flex-col items-center justify-center p-6 rounded-xl bg-white border border-slate-200 hover:border-blue-400 hover:shadow-md hover:bg-blue-50 transition-all text-slate-700">
                <div class="h-14 w-14 bg-blue-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                    <i class="ph ph-camera text-3xl text-blue-600"></i>
                </div>
                <span class="font-semibold text-sm sm:text-base">Kamera</span>
            </button>
            
            <label for="imageUpload" class="group flex flex-col items-center justify-center p-6 rounded-xl bg-white border border-slate-200 hover:border-slate-300 hover:shadow-md hover:bg-slate-50 transition-all text-slate-700 cursor-pointer">
                <div class="h-14 w-14 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                    <i class="ph ph-image text-3xl text-slate-600"></i>
                </div>
                <span class="font-semibold text-sm sm:text-base">Galeri</span>
                <input id="imageUpload" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
            </label>
        </div>

        <!-- Area Kamera -->
        <div id="cameraContainer" class="hidden flex-col gap-3 mb-4 fade-in">
            <div class="relative w-full bg-black rounded-xl overflow-hidden aspect-[3/4] flex items-center justify-center shadow-inner">
                <!-- Video stream (Object-cover agar tidak ada garis hitam, namun rasio HP tetap terjaga) -->
                <video id="cameraStream" class="w-full h-full object-cover" autoplay playsinline muted></video>
                
                <!-- Kotak Bantuan A4 di Kamera -->
                <div class="absolute inset-0 pointer-events-none">
                    <div class="reticle-corner reticle-tl"></div>
                    <div class="reticle-corner reticle-tr"></div>
                    <div class="reticle-corner reticle-bl"></div>
                    <div class="reticle-corner reticle-br"></div>
                    <div class="absolute top-4 w-full text-center">
                        <span class="bg-black/50 text-white/90 text-xs px-3 py-1 rounded-full backdrop-blur-sm shadow">Posisikan dokumen di dalam kotak</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="stopCamera()" class="flex-1 py-3 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition">Batal</button>
                <button onclick="capturePhoto()" class="flex-[2] py-3 bg-blue-600 text-white font-semibold rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition flex justify-center items-center gap-2">
                    <i class="ph-fill ph-aperture text-xl"></i> Jepret
                </button>
            </div>
        </div>

        <!-- Status Loading Pemrosesan -->
        <div id="loadingStatus" class="hidden flex-col items-center justify-center py-8 mb-2">
            <div class="loader mb-4"></div>
            <p id="statusText" class="text-sm font-semibold text-blue-700 text-center">Memproses Halaman...</p>
        </div>

        <!-- Hasil Ekstraksi (Akan Muncul Setelah Halaman 1 Selesai) -->
        <div id="resultContainer" class="hidden fade-in flex-col gap-5 mt-4">
            
            <!-- Metadata Form -->
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-3">
                    <i class="ph-fill ph-file-text text-blue-500 text-xl"></i>
                    <h3 class="font-bold text-slate-800 text-sm">Informasi Dokumen (Dari Hal. 1)</h3>
                </div>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">Order Number</label>
                        <div class="relative">
                            <i class="ph ph-hash absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="orderNumberInput" class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm text-slate-800 font-medium" placeholder="Menunggu scan...">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">Shipment Date</label>
                        <div class="relative">
                            <i class="ph ph-calendar-blank absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" id="shipmentDateInput" class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm text-slate-800 font-medium" placeholder="Menunggu scan...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Galeri Halaman Scan -->
            <div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <h3 class="text-sm font-bold text-slate-800">Halaman Discan (<span id="pageCount">0</span>)</h3>
                    <p class="text-[10px] text-slate-500">Klik gambar untuk memperbesar</p>
                </div>
                
                <!-- Grid untuk menampung gambar-gambar yang sudah di scan -->
                <div id="pagesGallery" class="grid grid-cols-3 sm:grid-cols-4 gap-2">
                    <!-- Thumbnail gambar akan di-generate di sini via JS -->
                </div>
            </div>

            <!-- Tombol Aksi Bawah -->
            <div class="flex gap-3 pt-2">
                <button onclick="startCamera()" class="flex-1 py-3 px-2 bg-blue-50 text-blue-700 font-semibold rounded-xl border border-blue-200 hover:bg-blue-100 transition flex justify-center items-center gap-1.5 text-sm">
                    <i class="ph-bold ph-plus"></i> Tambah Hal
                </button>
                <button id="saveBtn" onclick="saveAsPDF()" class="flex-[2] bg-slate-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-slate-300 transition flex justify-center items-center gap-2 text-sm">
                    <i class="ph-bold ph-file-pdf text-lg text-red-400"></i> Simpan PDF
                </button>
            </div>
        </div>
    </main>

    <!-- Lightbox (Penampil Gambar Besar) -->
    <div id="lightbox" class="hide fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
        <!-- Tombol Tutup -->
        <button onclick="closeLightbox()" class="absolute top-4 right-4 sm:top-8 sm:right-8 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full text-white flex items-center justify-center transition backdrop-blur">
            <i class="ph ph-x text-2xl"></i>
        </button>
        
        <!-- Gambar Besar -->
        <img id="lightboxImage" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" alt="Preview Dokumen Detail">
        
        <p class="text-white/60 text-sm mt-4">Ketuk layar di luar gambar untuk menutup</p>
    </div>

    <script>
        // --- KONFIGURASI ---
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwr6T6Q0dWXinD_hNYlUuORtnKrTCDBUkUwSfpkK70uKFIA2-Q9DzrLgprN45aRpkWB/exec";
        
        // --- STATE APLIKASI ---
        let scannedPages = []; // Array untuk menampung base64 gambar beresolusi tinggi (A4)
        let videoStream = null;

        // --- MANAJEMEN LIGHTBOX (View Gambar Besar) ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImage');

        function openLightbox(base64Src) {
            lightboxImg.src = base64Src;
            lightbox.classList.remove('hide');
            lightbox.classList.add('show');
        }

        function closeLightbox() {
            lightbox.classList.remove('show');
            lightbox.classList.add('hide');
            setTimeout(() => { lightboxImg.src = ''; }, 300); // Bersihkan memori src setelah animasi
        }

        // Tutup lightbox jika user klik area gelap (background)
        lightbox.addEventListener('click', function(e) {
            if(e.target === lightbox) closeLightbox();
        });

        // --- MANAJEMEN KAMERA ---
        
        async function startCamera() {
            const cameraContainer = document.getElementById('cameraContainer');
            const video = document.getElementById('cameraStream');
            const actionButtons = document.getElementById('actionButtons');
            const resultContainer = document.getElementById('resultContainer');
            
            try {
                // Meminta resolusi 4K agar kamera HP menggunakan lensa paling optimal tanpa zoom memotong
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } } 
                });
                video.srcObject = videoStream;
                
                cameraContainer.classList.remove('hidden');
                cameraContainer.classList.add('flex');
                actionButtons.classList.add('hidden');
                resultContainer.classList.add('hidden');
            } catch (err) {
                console.error("Gagal akses kamera:", err);
                alert("Kamera tidak dapat diakses. Pastikan izin kamera diaktifkan di browser Anda.");
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            document.getElementById('cameraContainer').classList.remove('flex');
            document.getElementById('cameraContainer').classList.add('hidden');
            
            // Tampilkan kembali hasil scan jika sudah ada halaman, jika belum, tampilkan tombol awal
            if(scannedPages.length > 0) {
                document.getElementById('resultContainer').classList.remove('hidden');
            } else {
                document.getElementById('actionButtons').classList.remove('hidden');
            }
        }

        // Fungsi Pintar: Crop ke Rasio A4
        function cropToA4(sourceElement, sourceWidth, sourceHeight) {
            // A4 Ratio = 1 : 1.414 (Portrait)
            // Jika orientasi gambar horizontal (landscape), kita jadikan 1.414 : 1
            const isPortrait = sourceHeight >= sourceWidth;
            const targetRatio = isPortrait ? (1 / 1.414) : 1.414;
            const currentRatio = sourceWidth / sourceHeight;
            
            let cropWidth = sourceWidth;
            let cropHeight = sourceHeight;
            let startX = 0;
            let startY = 0;

            // Perhitungan Center Crop
            if (currentRatio > targetRatio) {
                // Terlalu lebar -> Potong Kiri Kanan
                cropWidth = sourceHeight * targetRatio;
                startX = (sourceWidth - cropWidth) / 2;
            } else if (currentRatio < targetRatio) {
                // Terlalu tinggi -> Potong Atas Bawah
                cropHeight = sourceWidth / targetRatio;
                startY = (sourceHeight - cropHeight) / 2;
            }

            // Batasi ukuran piksel maksimal (misal max tinggi 2500px) agar RAM tidak jebol, namun tetap super tajam
            let scale = 1;
            let maxDim = Math.max(cropWidth, cropHeight);
            if (maxDim > 2500) scale = 2500 / maxDim;

            const finalWidth = cropWidth * scale;
            const finalHeight = cropHeight * scale;

            const canvas = document.createElement('canvas');
            canvas.width = finalWidth;
            canvas.height = finalHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Gambar bagian yang terpotong ke kanvas akhir
            ctx.drawImage(sourceElement, startX, startY, cropWidth, cropHeight, 0, 0, finalWidth, finalHeight);
            
            // Kembalikan gambar berkualitas tertinggi (1.0)
            return canvas.toDataURL('image/jpeg', 1.0);
        }

        function capturePhoto() {
            const video = document.getElementById('cameraStream');
            // Jika video belum ada dimensinya, jangan paksa foto
            if(!video.videoWidth) return; 
            
            // Gunting rasio A4 dari kamera
            const base64A4Image = cropToA4(video, video.videoWidth, video.videoHeight);
            stopCamera();
            processPageFlow(base64A4Image);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('actionButtons').classList.add('hidden');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Gunting rasio A4 dari gambar galeri
                    const base64A4Image = cropToA4(img, img.width, img.height);
                    processPageFlow(base64A4Image);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // --- PENINGKATAN KUALITAS JS MURNI (Warna Dipertahankan, Kontras & Tajam Dinaikkan) ---
        async function enhanceImage(base64Src) {
            return new Promise((resolve) => {
                let img = new Image();
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    let ctx = canvas.getContext('2d', { willReadFrequently: true });
                    ctx.drawImage(img, 0, 0);

                    // Ambil raw pixel data
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;

                    // 1. TINGKATKAN KONTRAS (Faktor Kontras ~ 60)
                    let contrast = 60; 
                    let factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                    
                    // 2. SHARPEN KERNEL (Untuk mempertegas tinta teks)
                    // Menggunakan Salinan untuk referensi kernel
                    let buff = new Uint8ClampedArray(data); 
                    let w = canvas.width;
                    let h = canvas.height;
                    let weights = [ 0, -1, 0, -1, 5, -1, 0, -1, 0 ];
                    let side = 3;
                    let halfSide = 1;

                    // Loop Piksel untuk Kontras DAN Sharpen sekaligus
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            let dstOff = (y * w + x) * 4;
                            
                            // Terapkan Sharpen (Konvolusi)
                            let r = 0, g = 0, b = 0;
                            for (let cy = 0; cy < side; cy++) {
                                for (let cx = 0; cx < side; cx++) {
                                    let scy = y + cy - halfSide;
                                    let scx = x + cx - halfSide;
                                    if (scy >= 0 && scy < h && scx >= 0 && scx < w) {
                                        let srcOff = (scy * w + scx) * 4;
                                        let wt = weights[cy * side + cx];
                                        r += buff[srcOff] * wt;
                                        g += buff[srcOff + 1] * wt;
                                        b += buff[srcOff + 2] * wt;
                                    }
                                }
                            }

                            // Terapkan Kontras pada hasil sharpen
                            data[dstOff] = factor * (r - 128) + 128;     // Red
                            data[dstOff + 1] = factor * (g - 128) + 128; // Green
                            data[dstOff + 2] = factor * (b - 128) + 128; // Blue
                            // Alpha dibiarkan data[dstOff + 3]
                        }
                    }

                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.9)); // Kualitas 90% setelah dienhance untuk hemat memory
                };
                img.src = base64Src;
            });
        }

        // --- ALUR PEMROSESAN HALAMAN ---
        async function processPageFlow(rawBase64) {
            const loadingStatus = document.getElementById('loadingStatus');
            const statusText = document.getElementById('statusText');
            
            loadingStatus.classList.remove('hidden');
            loadingStatus.classList.add('flex');
            
            const isFirstPage = scannedPages.length === 0;

            // Tahap 1: Peningkatan Visual (Crop A4 sudah di fungsi sebelumnya)
            statusText.innerText = "Memperjelas gambar dan mempertajam teks...";
            await new Promise(r => setTimeout(r, 50)); // Jeda untuk render UI
            
            const enhancedBase64 = await enhanceImage(rawBase64);
            scannedPages.push(enhancedBase64); // Simpan ke memori galeri
            
            // Tahap 2: OCR Cloud (HANYA UNTUK HALAMAN PERTAMA)
            if (isFirstPage) {
                statusText.innerText = "Cloud AI sedang membaca dokumen (OCR)...";
                await performCloudOCR(enhancedBase64);
            }

            // Update UI Galeri
            updateGalleryUI();
            
            loadingStatus.classList.remove('flex');
            loadingStatus.classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('flex');
        }

        function updateGalleryUI() {
            document.getElementById('pageCount').innerText = scannedPages.length;
            const gallery = document.getElementById('pagesGallery');
            gallery.innerHTML = ''; // Bersihkan

            scannedPages.forEach((base64Src, index) => {
                // Buat elemen thumbnail
                const thumbDiv = document.createElement('div');
                thumbDiv.className = "relative aspect-[1/1.414] bg-slate-200 rounded-lg overflow-hidden border border-slate-300 shadow-sm cursor-pointer hover:border-blue-500 hover:ring-2 hover:ring-blue-200 transition group";
                
                // Jika di-klik, buka Lightbox besar
                thumbDiv.onclick = () => openLightbox(base64Src);

                thumbDiv.innerHTML = `
                    <img src="${base64Src}" class="w-full h-full object-cover" />
                    <div class="absolute bottom-0 inset-x-0 bg-black/60 backdrop-blur-sm text-white text-[10px] text-center py-1 font-medium">
                        Hal. ${index + 1}
                    </div>
                    <div class="absolute inset-0 bg-blue-500/0 group-hover:bg-blue-500/10 transition flex items-center justify-center">
                        <i class="ph-fill ph-magnifying-glass-plus text-white opacity-0 group-hover:opacity-100 text-xl drop-shadow-md transition"></i>
                    </div>
                `;
                gallery.appendChild(thumbDiv);
            });
        }

        // --- BACKEND OCR (APPS SCRIPT / GOOGLE VISION) ---
        async function performCloudOCR(base64Src) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Src }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const data = await response.json();
                if (data.success) {
                    extractSmartData(data.text);
                } else {
                    console.error("OCR API Error:", data.error);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Gagal menghubungi server pembaca teks. Gunakan data manual.");
            }
        }

        function extractSmartData(text) {
            // REGEX PINTAR BARU (Tahan banting terhadap format)
            // Mengabaikan kata "Order/Packing", langsung mencari pola: 181- diikuti 8-15 angka
            let orderNo = "";
            const strictOrderRegex = /(?:181\-)[0-9]{8,15}/g;
            const orderMatches = text.match(strictOrderRegex);
            
            if(orderMatches && orderMatches.length > 0) {
                orderNo = orderMatches[0]; // Ambil yang pertama ketemu
            } else {
                // Cadangan: Cari format Order # ...
                const fallbackOrderRegex = /(?:Order|0rder)\s*#?\s*[:\-]?\s*([A-Za-z0-9\-]+)/i;
                const fallbackMatch = text.match(fallbackOrderRegex);
                if(fallbackMatch && fallbackMatch[1]) orderNo = fallbackMatch[1].trim();
            }

            // Mencari Tanggal (Lebih luwes menangkap format DD/MM/YYYY)
            let shipDate = "";
            const dateRegex = /(?:Shipment|Shiprnent|Shtptnent)\s*(?:Date|Dato)\s*[:\-]?\s*([0-9A-Za-z\/\-\.]+)/i;
            const dateMatch = text.match(dateRegex);
            
            if(dateMatch && dateMatch[1]) {
                shipDate = dateMatch[1].trim();
            } else {
                // Cadangan: Cari pola mirip tanggal (dd/mm/yyyy) di manapun di teks
                const fallbackDate = /([0-9]{1,2}[\/\-\.][0-9]{1,2}[\/\-\.][0-9]{2,4})/;
                const fbDateMatch = text.match(fallbackDate);
                if(fbDateMatch && fbDateMatch[1]) shipDate = fbDateMatch[1];
            }

            document.getElementById('orderNumberInput').value = orderNo || "Tidak ditemukan";
            document.getElementById('shipmentDateInput').value = shipDate || "Tidak ditemukan";
        }

        // --- EKSPOR KE PDF (Multi-Halaman) ---
        function saveAsPDF() {
            if (scannedPages.length === 0) return;

            // Ambil library jsPDF
            const { jsPDF } = window.jspdf;
            
            // Format A4, portrait, satuan milimeter
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;

            // Loop dan tambahkan setiap halaman gambar ke PDF
            for(let i = 0; i < scannedPages.length; i++) {
                if (i > 0) {
                    doc.addPage(); // Tambah halaman baru jika bukan gambar pertama
                }
                
                // Masukkan gambar (memenuhi 100% dimensi A4 karena sudah kita crop di rasio yang sama)
                doc.addImage(scannedPages[i], 'JPEG', 0, 0, pageWidth, pageHeight);
            }

            // Siapkan Nama File
            let orderNo = document.getElementById('orderNumberInput').value.trim();
            let shipDate = document.getElementById('shipmentDateInput').value.trim();

            if (!orderNo || orderNo === "Tidak ditemukan") orderNo = "Arsip";
            if (!shipDate || shipDate === "Tidak ditemukan") shipDate = "Dokumen";

            shipDate = shipDate.replace(/[\/\\]/g, '-'); // Bersihkan garis miring
            orderNo = orderNo.replace(/[^a-zA-Z0-9\-]/g, ''); // Bersihkan karakter aneh
            
            const newFileName = `${orderNo}_Date_${shipDate}.pdf`;

            // Proses Download otomatis
            doc.save(newFileName);
        }
    </script>
</body>
</html>
